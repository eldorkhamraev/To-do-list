<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Tasks</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #F7F5F0;
      --card: #FFFFFF;
      --text: #1A1A1A;
      --muted: #888;
      --border: #E5E2DA;
      --accent: #2D6A4F;
      --accent-light: #D8F3DC;
      --danger: #E63946;
      --done: #aaa;
      --radius: 12px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 3rem 1rem;
    }

    .container {
      width: 100%;
      max-width: 560px;
    }

    .header {
      margin-bottom: 2.5rem;
    }

    .header h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 2.4rem;
      font-weight: 400;
      letter-spacing: -0.5px;
      color: var(--text);
    }

    .header p {
      font-size: 0.875rem;
      color: var(--muted);
      margin-top: 4px;
      font-weight: 300;
    }

    .input-section {
      display: flex;
      gap: 8px;
      margin-bottom: 1.5rem;
    }

    .input-section input {
      flex: 1;
      padding: 12px 16px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      background: var(--card);
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }

    .input-section input::placeholder { color: #bbb; }
    .input-section input:focus { border-color: var(--accent); }

    .input-section button {
      padding: 12px 20px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: var(--radius);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    .input-section button:hover { background: #1B4332; }
    .input-section button:active { transform: scale(0.97); }

    .filters {
      display: flex;
      gap: 6px;
      margin-bottom: 1.25rem;
    }

    .filter-btn {
      padding: 5px 14px;
      border: 1.5px solid var(--border);
      border-radius: 20px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      font-weight: 400;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
    }

    .filter-btn:hover { border-color: var(--accent); color: var(--accent); }

    .filter-btn.active {
      background: var(--accent-light);
      color: var(--accent);
      border-color: transparent;
      font-weight: 500;
    }

    .todo-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .todo-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      transition: border-color 0.15s, opacity 0.2s;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .todo-item:hover { border-color: #ccc; }
    .todo-item.done { opacity: 0.5; }

    .check-btn {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      background: transparent;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }

    .check-btn:hover { border-color: var(--accent); }

    .check-btn.checked {
      background: var(--accent);
      border-color: var(--accent);
    }

    .check-btn.checked::after {
      content: '';
      display: block;
      width: 5px;
      height: 9px;
      border: 2px solid white;
      border-top: none;
      border-left: none;
      transform: rotate(45deg) translate(-1px, -1px);
    }

    .todo-text {
      flex: 1;
      font-size: 0.95rem;
      color: var(--text);
      font-weight: 300;
      line-height: 1.4;
      word-break: break-word;
    }

    .todo-item.done .todo-text {
      text-decoration: line-through;
      color: var(--done);
    }

    .delete-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #ccc;
      font-size: 1.2rem;
      line-height: 1;
      padding: 2px 4px;
      border-radius: 4px;
      transition: color 0.15s;
      flex-shrink: 0;
    }

    .delete-btn:hover { color: var(--danger); }

    .footer {
      margin-top: 1.25rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.8rem;
      color: var(--muted);
    }

    .clear-btn {
      background: none;
      border: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      color: var(--muted);
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
    }

    .clear-btn:hover { color: var(--danger); background: #fdecea; }

    .empty {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 300;
    }

    .progress-bar {
      height: 3px;
      background: var(--border);
      border-radius: 10px;
      margin-bottom: 1.5rem;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 10px;
      transition: width 0.3s ease;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>My tasks</h1>
      <p id="date-label"></p>
    </div>

    <div class="input-section">
      <input type="text" id="task-input" placeholder="What needs to be done?" />
      <button onclick="addTask()">Add</button>
    </div>

    <div class="filters">
      <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
      <button class="filter-btn" onclick="setFilter('active', this)">Active</button>
      <button class="filter-btn" onclick="setFilter('done', this)">Done</button>
    </div>

    <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>

    <div class="todo-list" id="todo-list"></div>

    <div class="footer">
      <span id="count-label"></span>
      <button class="clear-btn" onclick="clearDone()">Clear completed</button>
    </div>
  </div>

  <script>
    let todos = JSON.parse(localStorage.getItem('todos') || '[]');
    if (todos.length === 0) {
      todos = [
        { id: 1, text: 'Buy groceries', done: false },
        { id: 2, text: 'Read for 30 minutes', done: true },
        { id: 3, text: 'Go for a walk', done: false }
      ];
    }
    let nextId = todos.length ? Math.max(...todos.map(t => t.id)) + 1 : 1;
    let filter = 'all';

    document.getElementById('date-label').textContent = new Date().toLocaleDateString('en-US', {
      weekday: 'long', month: 'long', day: 'numeric'
    });

    document.getElementById('task-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') addTask();
    });

    function save() {
      localStorage.setItem('todos', JSON.stringify(todos));
    }

    function addTask() {
      const input = document.getElementById('task-input');
      const text = input.value.trim();
      if (!text) return;
      todos.unshift({ id: nextId++, text, done: false });
      input.value = '';
      save();
      render();
    }

    function toggleTask(id) {
      const t = todos.find(t => t.id === id);
      if (t) t.done = !t.done;
      save();
      render();
    }

    function deleteTask(id) {
      todos = todos.filter(t => t.id !== id);
      save();
      render();
    }

    function clearDone() {
      todos = todos.filter(t => !t.done);
      save();
      render();
    }

    function setFilter(f, btn) {
      filter = f;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    function render() {
      const list = document.getElementById('todo-list');
      const visible = todos.filter(t =>
        filter === 'all' ? true : filter === 'done' ? t.done : !t.done
      );
      const total = todos.length;
      const doneCount = todos.filter(t => t.done).length;
      const active = total - doneCount;

      const pct = total > 0 ? Math.round((doneCount / total) * 100) : 0;
      document.getElementById('progress').style.width = pct + '%';
      document.getElementById('count-label').textContent =
        active === 0 ? 'All tasks completed!' : `${active} task${active !== 1 ? 's' : ''} remaining`;

      if (visible.length === 0) {
        list.innerHTML = `<div class="empty">Nothing here yet</div>`;
        return;
      }

      list.innerHTML = visible.map(t => `
        <div class="todo-item ${t.done ? 'done' : ''}">
          <div class="check-btn ${t.done ? 'checked' : ''}" onclick="toggleTask(${t.id})"></div>
          <span class="todo-text">${t.text}</span>
          <button class="delete-btn" onclick="deleteTask(${t.id})">×</button>
        </div>
      `).join('');
    }

    render();
  </script>
</body>
</html>
